<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop</title>

<!-- CONNECTED CSS FILE -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <h1>MyShop</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
        <a href="#">Login</a>
    </nav>
</header>

<section class="hero">
    <h2>Best Deals Online</h2>
    <p>Shop amazing products at affordable prices</p>
</section>

<section class="products">

    <!-- Card with Sale Badge -->
    <div class="card">
        <span class="badge">Sale</span>
        <img src="https://picsum.photos/400/300" alt="Running Shoes">
        <div class="card-content">
            <h3>Running Shoes</h3>
            <div class="price">$49</div>
            <button>Add to Cart</button>
        </div>
    </div>

    <!-- Card with Sale Badge -->
    <div class="card">
        <span class="badge">Sale</span>
        <img src="https://picsum.photos/400/300" alt="Smart Watch">
        <div class="card-content">
            <h3>Smart Watch</h3>
            <div class="price">$99</div>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300" alt="Headphones">
        <div class="card-content">
            <h3>Headphones</h3>
            <div class="price">$39</div>
            <button>Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://picsum.photos/400/300" alt="Laptop">
        <div class="card-content">
            <h3>Laptop</h3>
            <div class="price">$599</div>
            <button>Add to Cart</button>
        </div>
    </div>

</section>

<footer>
    © 2026 MyShop. All rights reserved.
</footer>

</body>
</html>
