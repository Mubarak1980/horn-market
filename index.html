<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop | Best Deals Online</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->
    <header>
        <div class="container header-content">

            <div class="logo">
                <h1>MyShop</h1>
            </div>

            <!-- SEARCH -->
            <form class="search-bar">
                <input 
                    type="search" 
                    id="search-input" 
                    placeholder="Search products..."
                    aria-label="Search products"
                >
                <button type="button" id="search-btn">
                    Search
                </button>
            </form>

            <!-- NAVIGATION -->
            <nav>
                <ul>
                    <li><a href="#" onclick="showPage('home')">Home</a></li>
                    <li><a href="#" onclick="showPage('products')">Products</a></li>
                    <li>
                        <a href="#" onclick="showPage('cart')">
                            Cart (<span id="cart-count">0</span>)
                        </a>
                    </li>
                    <li><a href="#">Login</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- =========================
         APP VIEWS (EMPTY SHELLS)
    ========================== -->

    <!-- HOME -->
    <section id="home-page">
        <section class="hero">
            <h2>Best Deals Online</h2>
            <p>Shop amazing products at affordable prices</p>
        </section>

        <!-- JS RENDERS FEATURED PRODUCTS HERE -->
        <main class="products" id="home-products"></main>
    </section>

    <!-- PRODUCTS -->
    <section id="products-page" class="hidden">
        <section class="hero">
            <h2>All Products</h2>
            <p>Browse our complete collection</p>
        </section>

        <!-- JS RENDERS ALL PRODUCTS HERE -->
        <main class="products" id="all-products"></main>
    </section>

    <!-- CART -->
    <section id="cart-page" class="hidden">
        <div class="container">

            <h2>Your Cart</h2>

            <div id="cart-items"></div>

            <h3 id="total-price">Total: $0</h3>

        </div>
    </section>

    <!-- =========================
         FOOTER
    ========================== -->
    <footer>
        <p>&copy; 2026 MyShop. All rights reserved.</p>
    </footer>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
