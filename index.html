<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horn Market | Premium Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo" onclick="window.location.reload()">
            <img src="logo.png" alt="Horn Market Logo"> 
            <span>Horn Market</span>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search electronics, clothing, fashion...">
            <button class="btn" onclick="searchProducts()">Search</button>
        </div>

        <nav class="nav">
            <a href="login.html">Login</a>
            <a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Buy & Sell Everything in One Place</h1>
            <p>Your trusted regional hub for premium electronics, fashion, and lifestyle items.</p>
            <button class="btn" onclick="scrollToProducts()">Explore Now</button>
        </div>
    </section>

    <main class="container">
        <section id="productsSection">
            <div class="products-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Featured Products</h2>
                <select onchange="setSortType(this.value)">
                    <option value="default">Sort by: Default</option>
                    <option value="low">Price: Low to High</option>
                    <option value="high">Price: High to Low</option>
                </select>
            </div>

            <div id="productGrid"></div>
        </section>
    </main>

    <section class="why-us" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px; padding: 40px 5%;">
        <div class="card">🔒 Safe & Trusted Sellers</div>
        <div class="card">💰 Best Prices</div>
        <div class="card">⚡ Fast Communication</div>
    </section>

    <footer class="footer" style="text-align:center; padding: 40px; color:var(--text-muted);">
        <p>© 2026 Horn Market. All rights reserved.</p>
    </footer>

    <script src="auth.js"></script>
    <script src="main.js"></script>
    <script src="products.js"></script>
    <script src="search.js"></script>
    
    <script>
        function scrollToProducts() {
            document.getElementById("productsSection").scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
