<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop | Best Deals Online</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="container header-content">

            <div class="logo">
                <h1>MyShop</h1>
            </div>

            <!-- SEARCH -->
            <form class="search-bar">
                <input 
                    type="search" 
                    id="search-input" 
                    placeholder="Search products..."
                    aria-label="Search products"
                >
                <button type="button" id="search-btn" class="search-btn">
                    Search
                </button>
            </form>

            <!-- NAVIGATION -->
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Products</a></li>
                    <li><a href="#">Cart</a></li>
                    <li><a href="#" class="login-btn">Login</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- HERO -->
    <section class="hero">
        <h2>Best Deals Online</h2>
        <p>Shop amazing products at affordable prices</p>
    </section>

    <!-- PRODUCTS -->
    <main class="products">

        <article class="card" data-id="1" data-category="shoes">
            
            <div class="image-wrapper">
                <span class="badge">Sale</span>
                <img src="https://picsum.photos/400/300" alt="Running Shoes">
            </div>

            <div class="card-content">
                <h3>Running Shoes</h3>
                <p class="price">$49</p>
                <button type="button" class="add-to-cart">
                    Add to Cart
                </button>
            </div>
        </article>

        <article class="card" data-id="2" data-category="electronics">

            <div class="image-wrapper">
                <span class="badge">Sale</span>
                <img src="https://picsum.photos/400/300" alt="Smart Watch">
            </div>

            <div class="card-content">
                <h3>Smart Watch</h3>
                <p class="price">$99</p>
                <button type="button" class="add-to-cart">
                    Add to Cart
                </button>
            </div>
        </article>

        <article class="card" data-id="3" data-category="electronics">

            <div class="image-wrapper">
                <img src="https://picsum.photos/400/300" alt="Headphones">
            </div>

            <div class="card-content">
                <h3>Headphones</h3>
                <p class="price">$39</p>
                <button type="button" class="add-to-cart">
                    Add to Cart
                </button>
            </div>
        </article>

        <article class="card" data-id="4" data-category="laptops">

            <div class="image-wrapper">
                <img src="https://picsum.photos/400/300" alt="Laptop">
            </div>

            <div class="card-content">
                <h3>Laptop</h3>
                <p class="price">$599</p>
                <button type="button" class="add-to-cart">
                    Add to Cart
                </button>
            </div>
        </article>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 MyShop. All rights reserved.</p>
    </footer>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
