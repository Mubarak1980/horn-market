<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MyShop | Modern E-Commerce</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     HEADER
========================= -->
<header role="banner">
    <div class="container header-content">

        <!-- LOGO -->
        <div class="logo">
            <h1>MyShop</h1>
        </div>

        <!-- SEARCH -->
        <form class="search-bar" role="search">
            <input 
                type="search"
                id="search-input"
                placeholder="Search products..."
                aria-label="Search products"
                autocomplete="off"
            >

            <button type="button" id="search-btn">
                Search
            </button>
        </form>

        <!-- NAV -->
        <nav role="navigation" aria-label="Main navigation">
            <ul>
                <li>
                    <a href="#" data-page="home" class="nav-link active">Home</a>
                </li>

                <li>
                    <a href="#" data-page="products" class="nav-link">Products</a>
                </li>

                <li>
                    <a href="#" data-page="cart" class="nav-link">
                        Cart
                        <span id="cart-count">0</span>
                    </a>
                </li>

                <li>
                    <a href="#" class="login-btn">Login</a>
                </li>
            </ul>
        </nav>

    </div>
</header>


<!-- =========================
     HOME VIEW
========================= -->
<section id="home-page" class="page">

    <section class="hero">
        <h2>Best Deals Online</h2>
        <p>Shop premium products at unbeatable prices</p>
    </section>

    <main class="products" id="home-products">
        <!-- JS RENDERS PRODUCTS -->
    </main>

</section>


<!-- =========================
     PRODUCTS VIEW
========================= -->
<section id="products-page" class="page hidden">

    <section class="hero">
        <h2>All Products</h2>
        <p>Explore our full catalog</p>
    </section>

    <main class="products" id="all-products">
        <!-- JS RENDERS PRODUCTS -->
    </main>

</section>


<!-- =========================
     CART VIEW
========================= -->
<section id="cart-page" class="page hidden">

    <div class="container">

        <h2>Your Cart</h2>

        <!-- EMPTY STATE -->
        <div id="cart-empty" class="empty-cart hidden">
            Your cart is empty. Start shopping!
        </div>

        <!-- CART ITEMS -->
        <div id="cart-items"></div>

        <div class="cart-summary">
            <h3 id="total-price">Total: $0</h3>
        </div>

    </div>

</section>


<!-- =========================
     FOOTER
========================= -->
<footer role="contentinfo">
    <p>&copy; 2026 MyShop. All rights reserved.</p>
</footer>


<!-- JS -->
<script src="script.js"></script>

</body>
</html>
