<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop | Modern E-Commerce</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     HEADER
========================= -->
<header>
    <div class="container header-content">

        <!-- LOGO -->
        <div class="logo">
            <h1>MyShop</h1>
        </div>

        <!-- SEARCH -->
        <form class="search-bar" onsubmit="return false;">
            <input 
                type="search"
                id="search-input"
                placeholder="Search products..."
                autocomplete="off"
            >
            <button type="button" id="search-btn">Search</button>
        </form>

        <!-- NAV -->
        <nav>
            <ul>
                <li>
                    <a href="#" data-page="home" class="nav-link active">Home</a>
                </li>

                <li>
                    <a href="#" data-page="products" class="nav-link">Products</a>
                </li>

                <li>
                    <a href="#" data-page="cart" class="nav-link">
                        Cart (<span id="cart-count">0</span>)
                    </a>
                </li>

                <li>
                    <a href="#" class="login-btn">Login</a>
                </li>
            </ul>
        </nav>

    </div>
</header>


<!-- =========================
     HOME PAGE
========================= -->
<section id="home-page" class="page">

    <section class="hero">
        <h2>Best Deals Online</h2>
        <p>High-quality products at affordable prices</p>
    </section>

    <main class="products" id="home-products">
        <!-- JS RENDERS PRODUCTS -->
    </main>

</section>


<!-- =========================
     PRODUCTS PAGE
========================= -->
<section id="products-page" class="page hidden">

    <section class="hero">
        <h2>All Products</h2>
        <p>Browse full catalog</p>
    </section>

    <main class="products" id="all-products">
        <!-- JS RENDERS PRODUCTS -->
    </main>

</section>


<!-- =========================
     CART PAGE
========================= -->
<section id="cart-page" class="page hidden">

    <div class="container">

        <h2>Your Cart</h2>

        <!-- EMPTY STATE -->
        <div id="cart-empty" class="empty-cart hidden">
            Your cart is empty. Start shopping now.
        </div>

        <!-- CART ITEMS -->
        <div id="cart-items"></div>

        <!-- SUMMARY -->
        <div class="cart-summary">
            <h3 id="total-price">Total: $0</h3>
        </div>

    </div>

</section>


<!-- =========================
     FOOTER
========================= -->
<footer>
    <p>&copy; 2026 MyShop. All rights reserved.</p>
</footer>


<!-- JS -->
<script src="script.js"></script>

</body>
</html>
