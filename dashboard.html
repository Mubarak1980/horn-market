
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Horn Market</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- ================= DASHBOARD ================= -->
<section class="container mt-3">

    <h1>📊 Seller Dashboard</h1>

    <!-- ================= STATS ================= -->
    <div class="grid grid-4 mt-3">

        <div class="card text-center">
            <h3>Total Products</h3>
            <p id="totalProducts">0</p>
        </div>

        <div class="card text-center">
            <h3>Orders</h3>
            <p id="totalOrders">0</p>
        </div>

        <div class="card text-center">
            <h3>Revenue</h3>
            <p id="totalRevenue">$0</p>
        </div>

        <div class="card text-center">
            <h3>Users</h3>
            <p id="totalUsers">0</p>
        </div>

    </div>

    <!-- ================= ACTIONS ================= -->
    <div class="mt-3">

        <a href="add-product.html" class="btn">
            ➕ Add Product
        </a>

    </div>

    <!-- ================= PRODUCTS TABLE ================= -->
    <div class="mt-3">

        <h2>My Products</h2>

        <div id="dashboardProducts" class="grid grid-3 mt-2">

            <!-- dynamic products -->

        </div>

    </div>

</section>

<!-- ================= SCRIPTS ================= -->
<script src="../js/main.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/products.js"></script>
<script src="../js/api.js"></script>

<script>
/* ========================================
   INIT DASHBOARD
======================================== */

document.addEventListener("DOMContentLoaded", () => {

    const user = getCurrentUser();

    if (!user) {
        showAlert("Login required", "error");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);

        return;
    }

    loadDashboard(user);
});

/* ========================================
   LOAD DASHBOARD DATA
======================================== */

function loadDashboard(user) {

    const products =
        getFromStorage("products") || [];

    const myProducts =
        products.filter(p =>
            p.sellerId === user.id
        );

    // STATS
    document.getElementById("totalProducts").textContent =
        myProducts.length;

    const orders =
        getFromStorage("orders") || [];

    document.getElementById("totalOrders").textContent =
        orders.length;

    document.getElementById("totalRevenue").textContent =
        "$" + calculateRevenue(orders);

    const users =
        getFromStorage("users") || [];

    document.getElementById("totalUsers").textContent =
        users.length;

    // PRODUCTS
    renderDashboardProducts(myProducts);
}

/* ========================================
   RENDER PRODUCTS
======================================== */

function renderDashboardProducts(products) {

    const container =
        document.getElementById("dashboardProducts");

    if (!container) return;

    if (products.length === 0) {
        container.innerHTML =
            "<p>No products yet.</p>";
        return;
    }

    container.innerHTML = products
        .map(product => `
            <div class="card">

                <img
                    src="${product.image}"
                    alt="${product.name}"
                />

                <h3>${product.name}</h3>

                <p>${formatPrice(product.price)}</p>

                <button
                    onclick="deleteProduct(${product.id})"
                    class="btn"
                    style="background:red;"
                >
                    Delete
                </button>

            </div>
        `)
        .join("");
}

/* ========================================
   DELETE PRODUCT
======================================== */

function deleteProduct(id) {

    let products =
        getFromStorage("products") || [];

    products =
        products.filter(p => p.id !== id);

    saveToStorage("products", products);

    showAlert("Product deleted");

    location.reload();
}

/* ========================================
   REVENUE CALC (BASIC)
======================================== */

function calculateRevenue(orders) {

    let total = 0;

    orders.forEach(order => {
        total += order.total || 0;
    });

    return total.toFixed(2);
}
</script>

</body>
</html>
