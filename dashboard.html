<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Horn Market</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container mt-3">

    <h1>📊 Seller Dashboard</h1>

    <div class="grid grid-4 mt-3">

        <div class="card text-center" style="padding: 20px;">
            <h3>Total Products</h3>
            <p id="totalProducts" style="font-size: 1.8rem; font-weight: bold; color: var(--primary-color); margin-top: 10px;">0</p>
        </div>

        <div class="card text-center" style="padding: 20px;">
            <h3>Orders</h3>
            <p id="totalOrders" style="font-size: 1.8rem; font-weight: bold; color: var(--primary-color); margin-top: 10px;">0</p>
        </div>

        <div class="card text-center" style="padding: 20px;">
            <h3>Revenue</h3>
            <p id="totalRevenue" style="font-size: 1.8rem; font-weight: bold; color: var(--success-color); margin-top: 10px;">$0</p>
        </div>

        <div class="card text-center" style="padding: 20px;">
            <h3>Users</h3>
            <p id="totalUsers" style="font-size: 1.8rem; font-weight: bold; color: var(--text-light); margin-top: 10px;">0</p>
        </div>

    </div>

    <div class="mt-3">

        <a href="add-product.html" class="btn">
            ➕ Add Product
        </a>

    </div>

    <div class="mt-3">

        <h2 class="mb-1">My Products</h2>

        <div id="dashboardProducts" class="grid grid-3 mt-2">
            </div>

    </div>

</section>

<script src="main.js"></script>
<script src="auth.js"></script>
<script src="products.js"></script>

<script>
/* ========================================
   INIT DASHBOARD
======================================== */

document.addEventListener("DOMContentLoaded", () => {

    const user = getCurrentUser();

    if (!user) {
        // Safe check if showAlert hasn't loaded yet from main.js
        if (typeof showAlert === "function") {
            showAlert("Login required", "error");
        } else {
            alert("Login required");
        }

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);

        return; // Terminates execution immediately
    }

    loadDashboard(user);
});

/* ========================================
   LOAD DASHBOARD DATA
======================================== */

function loadDashboard(user) {

    const products =
        getFromStorage("products") || [];

    const myProducts =
        products.filter(p =>
            p.sellerId === user.id
        );

    // STATS
    document.getElementById("totalProducts").textContent =
        myProducts.length;

    const orders =
        getFromStorage("orders") || [];

    document.getElementById("totalOrders").textContent =
        orders.length;

    document.getElementById("totalRevenue").textContent =
        formatPrice(calculateRevenue(orders));

    const users =
        getFromStorage("users") || [];

    document.getElementById("totalUsers").textContent =
        users.length;

    // PRODUCTS
    renderDashboardProducts(myProducts);
}

/* ========================================
   RENDER PRODUCTS
======================================== */

function renderDashboardProducts(productsList) {

    const container =
        document.getElementById("dashboardProducts");

    if (!container) return;

    if (productsList.length === 0) {
        container.innerHTML =
            "<p class='text-muted'>You haven't listed any items for sale yet.</p>";
        return;
    }

    container.innerHTML = productsList
        .map(product => `
            <div class="product-card">

                <img
                    src="${product.image || 'logo.png'}"
                    alt="${product.name}"
                />

                <h3>${product.name}</h3>

                <p class="price">${formatPrice(product.price)}</p>

                <button
                    onclick="deleteProduct(${product.id})"
                    class="btn"
                    style="background: var(--danger-color); width: 100%; margin-top: 10px;"
                >
                    Delete Listing
                </button>

            </div>
        `)
        .join("");
}

/* ========================================
   DELETE PRODUCT
======================================== */

function deleteProduct(id) {

    let products =
        getFromStorage("products") || [];

    products =
        products.filter(p => p.id !== id);

    saveToStorage("products", products);

    if (typeof showAlert === "function") {
        showAlert("Product deleted", "success");
    }

    setTimeout(() => {
        location.reload();
    }, 800);
}

/* ========================================
   REVENUE CALC (BASIC)
======================================== */

function calculateRevenue(orders) {

    let total = 0;

    orders.forEach(order => {
        total += Number(order.total) || 0;
    });

    return total;
}
</script>

</body>
</html>
