<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | Horn Market</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<section class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <h1>📦 Add New Product</h1>
        </div>

        <div class="auth-title">
            <h2>Sell Your Product</h2>
            <p>Fill in the details below</p>
        </div>

        <div id="alertBox"></div>

        <div class="auth-form">

            <div class="form-group">
                <label>Product Name</label>
                <input
                    type="text"
                    id="productName"
                    class="auth-input"
                    placeholder="e.g. iPhone 15 Pro"
                />
            </div>

            <div class="form-group">
                <label>Price</label>
                <input
                    type="number"
                    id="productPrice"
                    class="auth-input"
                    placeholder="Enter price"
                />
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="productCategory" class="auth-input" style="background: #fff;">
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="fashion">Fashion</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea
                    id="productDescription"
                    class="auth-input"
                    rows="4"
                    placeholder="Describe your product"
                ></textarea>
            </div>

            <div class="form-group">
                <label>Image URL (Optional)</label>
                <input
                    type="text"
                    id="productImage"
                    class="auth-input"
                    placeholder="e.g. logo.png or online image link"
                />
            </div>

            <button
                class="auth-btn"
                onclick="addProduct()"
            >
                Add Product
            </button>

        </div>

        <div class="auth-footer">
            <p>
                Back to
                <a href="index.html">Home</a> or <a href="dashboard.html">Dashboard</a>
            </p>
        </div>

    </div>

</section>

<script src="main.js"></script>
<script src="auth.js"></script>

<script>
/* ========================================
   ADD PRODUCT FUNCTION
======================================== */

function addProduct() {
    // SECURITY: Ensure user is actually logged in before creating listings
    const user = getCurrentUser();
    if (!user) {
        if (typeof showAlert === "function") {
            showAlert("You must be logged in to add products.", "error");
        } else {
            alert("You must be logged in to add products.");
        }
        return;
    }

    const name =
        document.getElementById("productName").value.trim();

    const price =
        document.getElementById("productPrice").value.trim();

    const category =
        document.getElementById("productCategory").value;

    const description =
        document.getElementById("productDescription").value.trim();

    let image =
        document.getElementById("productImage").value.trim();

    if (!name || !price || !category) {
        if (typeof showAlert === "function") {
            showAlert("Please fill required fields", "error");
        } else {
            alert("Please fill required fields");
        }
        return;
    }

    // Default placeholder fallback asset if string is left empty
    if (!image) {
        image = "logo.png";
    }

    const newProduct = {
        id: Date.now(),
        sellerId: user.id, // FIXED: Links the product explicitly to the logged in vendor profile
        name,
        price: Number(price),
        category,
        description,
        image,
        featured: false,
        createdAt: new Date().toISOString()
    };

    let products = getFromStorage("products") || [];

    products.push(newProduct);
    saveToStorage("products", products);

    if (typeof showAlert === "function") {
        showAlert("Product added successfully!", "success");
    } else {
        alert("Product added successfully!");
    }

    setTimeout(() => {
        // Automatically takes them back to their vendor desk view profile
        window.location.href = "dashboard.html";
    }, 1200);
}
</script>

</body>
</html>
