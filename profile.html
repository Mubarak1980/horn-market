<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Horn Market</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="profile-page container">

    <div class="card profile-card">

        <h2>User Profile</h2>

        <div id="userInfo">
            <p><strong>Name:</strong> <span id="userName">Loading...</span></p>
            <p><strong>Email:</strong> <span id="userEmail">Loading...</span></p>
            <p><strong>Phone:</strong> <span id="userPhone">-</span></p>
        </div>

        <button class="btn" onclick="logoutUser()">
            Logout
        </button>

    </div>

    <div class="grid grid-3 mt-3">

        <div class="card text-center">
            <h3>Cart</h3>
            <p id="cartCount">0</p>
        </div>

        <div class="card text-center">
            <h3>Favorites</h3>
            <p id="favoritesCount">0</p>
        </div>

        <div class="card text-center">
            <h3>Orders</h3>
            <p id="ordersCount">0</p>
        </div>

    </div>

    <div class="mt-3">

        <h2>My Products</h2>

        <div id="myProducts" class="grid grid-4 mt-2">

            </div>

    </div>

</section>

<script src="main.js"></script>
<script src="auth.js"></script>
<script src="products.js"></script>
<script src="api.js"></script>

<script>
/* ========================================
   LOAD PROFILE DATA
======================================== */

document.addEventListener("DOMContentLoaded", () => {

    const user = getCurrentUser();

    if (!user) {
        showAlert("Please login first", "error");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);

        return;
    }

    // Fill user info
    document.getElementById("userName").textContent =
        user.name;

    document.getElementById("userEmail").textContent =
        user.email;

    document.getElementById("userPhone").textContent =
        user.phone || "-";

    // Load stats
    updateCartCount();
    updateFavoritesCount();

    const orders = getFromStorage("orders") || [];
    document.getElementById("ordersCount").textContent =
        orders.length;

    // Load user products (if exists)
    loadMyProducts(user);
});

/* ========================================
   LOAD USER PRODUCTS
======================================== */

function loadMyProducts(user) {

    const allProducts =
        getFromStorage("products") || [];

    const myProducts =
        allProducts.filter(p =>
            p.sellerId === user.id
        );

    const container =
        document.getElementById("myProducts");

    if (!container) return;

    if (myProducts.length === 0) {
        container.innerHTML =
            "<p>No products yet.</p>";
        return;
    }

    container.innerHTML = myProducts
        .map(product => `
            <div class="card">

                <img
                    src="${product.image}"
                    alt="${product.name}"
                />

                <h3>${product.name}</h3>

                <p>${formatPrice(product.price)}</p>

            </div>
        `)
        .join("");
}
</script>

</body>
</html>
