<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Horn Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="product.css">
    <style>
        /* Fade-in effect for dynamic loading */
        #dynamicProductSection { transition: opacity 0.3s ease; opacity: 0; }
        #dynamicProductSection.loaded { opacity: 1; }
    </style>
</head>
<body>

  <header class="header">
      <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
          <img src="logo.png" alt="Logo"> Horn Market
      </div>
      <nav class="nav">
          <a href="index.html">🏠 Home</a>
          <a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a>
      </nav>
  </header>

  <main class="product-page">
    <div id="dynamicProductSection" class="product-section">
        <div class="loading-state">Loading premium item configuration...</div>
    </div>
  </main>

  <script src="main.js"></script>
  <script>
    let activeInspectedProduct = null;

    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("dynamicProductSection");
        const urlParams = new URLSearchParams(window.location.search);
        const productId = Number(urlParams.get('id'));

        if (!productId) {
            displayEmergencyNotice("Product ID missing from request.");
            return;
        }

        const products = getFromStorage("products") || [];
        activeInspectedProduct = products.find(p => p.id === productId);

        if (!activeInspectedProduct) {
            displayEmergencyNotice("Product not found in inventory.");
            return;
        }

        renderProductUI(activeInspectedProduct);
    });

    function renderProductUI(product) {
        const container = document.getElementById("dynamicProductSection");
        
        container.innerHTML = `
            <div class="product-gallery">
                <img src="${product.image || 'logo.png'}" class="main-image" alt="${product.name}">
            </div>
            <div class="product-details">
                <div class="product-category">${product.category || 'General'}</div>
                <h1>${product.name}</h1>
                <div class="product-price">${formatPrice(product.price)}</div>
                <p>${product.description || 'No description available for this item.'}</p>
                <button class="btn" onclick="executeMainCartAddition()" style="width:100%">🛒 Add to Cart</button>
            </div>
            <div class="seller-card">
                <h3>Seller Profile</h3>
                <p>👤 Ahmed Regional Trader</p>
                <button class="contact-btn" onclick="window.open('https://wa.me/252610000000', '_blank')">💬 Contact on WhatsApp</button>
            </div>
        `;
        
        container.classList.add('loaded');
    }

    function executeMainCartAddition() {
        if (!activeInspectedProduct) return;

        let cart = getFromStorage("cart") || [];
        
        // Check for duplicates
        if (cart.some(item => item.id === activeInspectedProduct.id)) {
            showAlert("Item is already in your cart!", "warning");
            return;
        }

        cart.push(activeInspectedProduct);
        saveToStorage("cart", cart);
        updateCartCount(); // From main.js
        showAlert("Successfully added to cart!", "success");
    }

    function displayEmergencyNotice(msg) {
        const container = document.getElementById("dynamicProductSection");
        container.innerHTML = `
            <div style="text-align:center; padding: 50px;">
                <p style="color:var(--danger, red); margin-bottom:20px;">${msg}</p>
                <a href="index.html" class="btn">Return to Store</a>
            </div>
        `;
        container.classList.add('loaded');
    }
  </script>
</body>
</html>
