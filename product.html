<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Horn Market</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="product.css">
</head>
<body>

  <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 5%;">
      <div class="logo" onclick="window.location.href='index.html'" style="display: flex; align-items: center; cursor: pointer; font-size: 1.8rem; font-weight: 700; color: var(--primary-color);">
          <img src="logo.png" alt="Horn Market Logo" style="height: 35px; margin-right: 8px;"> 
          Horn Market
      </div>
      <nav class="nav" style="display: flex; gap: 20px; align-items: center;">
          <a href="index.html" style="font-weight: 600;">Home</a>
          <a href="cart.html" style="font-weight: 600;">🛒 Cart</a>
      </nav>
  </header>

  <main class="product-page">
    <div id="dynamicProductSection" class="product-section">
        <div style="grid-column: 1/-1; text-align: center; padding: 60px 0; color: var(--text-light);">
            Fetching premium item configurations...
        </div>
    </div>
  </main>

  <script src="main.js"></script>

  <script>
    let activeInspectedProduct = null;

    document.addEventListener("DOMContentLoaded", () => {
        loadProductDashboard();
    });

    function loadProductDashboard() {
        const container = document.getElementById("dynamicProductSection");
        if (!container) return;

        // 1. Grab the product identity token from URL address attributes parameters
        const urlParams = new URLSearchParams(window.location.search);
        const productId = Number(urlParams.get('id'));

        if (!productId) {
            displayEmergencyNotice("Invalid item path reference mapping.");
            return;
        }

        // 2. Safely capture data lists items arrays dictionary cache
        let storedCatalog = [];
        try {
            storedCatalog = JSON.parse(localStorage.getItem("products")) || [];
        } catch (e) {
            console.error("Local storage lookup mapping error:", e);
        }

        // 3. Match the electronic asset tracking instance identity
        activeInspectedProduct = storedCatalog.find(p => p.id === productId);

        if (!activeInspectedProduct) {
            displayEmergencyNotice("Product details could not be found in active records inventory.");
            return;
        }

        // 4. Formulate pricing formatting helper metrics
        const outputPrice = typeof formatPrice === "function" ? formatPrice(activeInspectedProduct.price) : `$${activeInspectedProduct.price}`;

        // 5. Build dynamic injection mapping layouts blocks
        container.innerHTML = `
            <div class="product-gallery">
                <img src="${activeInspectedProduct.image || 'logo.png'}" class="main-image" alt="${activeInspectedProduct.name}">
                <div class="thumbnail-list">
                    <img src="${activeInspectedProduct.image || 'logo.png'}" alt="Thumb 1" style="border-color: var(--primary-color);">
                    <img src="logo.png" alt="Thumb 2 Default">
                </div>
            </div>

            <div class="product-details">
                <div class="product-category">${activeInspectedProduct.category || 'Electronics'}</div>
                <h1 class="product-title">${activeInspectedProduct.name}</h1>
                <div class="product-rating">⭐⭐⭐⭐⭐ (Verified Listing)</div>
                <div class="product-price">${outputPrice}</div>
                <p class="product-description">
                    ${activeInspectedProduct.description || 'Premium regional item entry. Guaranteed verified parameters and authentic system architecture modules tailored for user deployment.'}
                </p>
                <div style="margin-top: 30px;">
                    <button class="btn" style="width:100%; padding: 14px;" onclick="executeMainCartAddition()">🛒 Add to Shopping Cart</button>
                </div>
            </div>

            <div class="seller-card">
                <h3>Seller Profile</h3>
                <div class="seller-name">👤 Ahmed Regional Trader</div>
                <div class="seller-location">📍 Mogadishu / Hargeisa, Horn Hub</div>
                <hr style="border:0; border-top:1px solid var(--border-color); margin-bottom:15px;">
                <button class="contact-btn" onclick="window.open('https://wa.me/252610000000', '_blank')">💬 Contact via WhatsApp</button>
                <button class="message-btn" onclick="alert('Starting live app chat messenger pipeline...')">⚡ Message Seller</button>
            </div>
        `;
    }

    function executeMainCartAddition() {
        if (!activeInspectedProduct) return;

        let basket = [];
        try { basket = JSON.parse(localStorage.getItem("cart")) || []; } catch (e) {}

        const itemInBasket = basket.some(item => item.id === activeInspectedProduct.id);

        if (!itemInBasket) {
            basket.push(activeInspectedProduct);
            localStorage.setItem("cart", JSON.stringify(basket));
            if (typeof showAlert === "function") showAlert("Successfully placed in shopping cart!", "success");
            else alert("Successfully placed in shopping cart!");
        } else {
            if (typeof showAlert === "function") showAlert("Item is already in your shopping cart summary checklist.", "warning");
            else alert("Item is already in your shopping cart summary checklist.");
        }
    }

    function displayEmergencyNotice(msg) {
        const container = document.getElementById("dynamicProductSection");
        if (container) {
            container.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px;">
                    <p style="color: var(--danger-color); font-weight: 600; font-size: 1.2rem; margin-bottom: 20px;">${msg}</p>
                    <a href="index.html" class="btn">Return to Storefront Catalog</a>
                </div>
            `;
        }
    }
  </script>
</body>
</html>
