<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Horn Market</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<section class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <h1>🛒 Horn Market</h1>
        </div>

        <div class="auth-title">
            <h2>Welcome Back</h2>
            <p>Login to manage your business and products</p>
        </div>

        <div id="alertBox"></div>

        <form class="auth-form" onsubmit="handleFormSubmit(event)">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    class="auth-input"
                    placeholder="name@example.com"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        class="auth-input"
                        placeholder="Enter your password"
                        required
                    />
                    <span class="password-toggle" onclick="togglePasswordVisibility()">👁️</span>
                </div>
            </div>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>

            <button
                type="submit"
                class="auth-btn"
            >
                Login
            </button>

        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <div class="social-login">
            <button class="social-btn" type="button">
                Continue with Google
            </button>
            <button class="social-btn" type="button">
                Continue with Facebook
            </button>
        </div>

        <div class="auth-footer">
            <p>
                Don't have an account?
                <a href="signup.html">Sign up</a>
            </p>
            <p style="margin-top: 10px; font-size: 0.9rem;">
                <a href="index.html" style="color: var(--text-light); font-weight: normal;">← Back to Home</a>
            </p>
        </div>

    </div>

</section>

<script src="main.js"></script>
<script src="auth.js"></script>

<script>
/* ========================================
   LOCAL FORM BRIDGE HANDLER
======================================== */
function handleFormSubmit(event) {
    event.preventDefault(); // Stifles page refresh loops
    
    // Safety check: Call loginUser if it is defined in auth.js
    if (typeof loginUser === "function") {
        loginUser();
    } else {
        console.error("loginUser function not found in auth.js");
    }
}

/* ========================================
   PASSWORD EYE TOGGLE DYNAMICS
======================================== */
function togglePasswordVisibility() {
    const passwordInput = document.getElementById("password");
    const toggleIcon = document.querySelector(".password-toggle");
    
    if (!passwordInput) return;
    
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.textContent = "🙈"; // Swap icon representation safely
    } else {
        passwordInput.type = "password";
        toggleIcon.textContent = "👁️";
    }
}
</script>

</body>
</html>
