<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Horn Market</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<section class="auth-page">

    <div class="auth-card">

        <div class="auth-logo">
            <h1>🛒 Horn Market</h1>
        </div>

        <div class="auth-title">
            <h2>Create Account</h2>
            <p>Join the marketplace to buy and sell electronics</p>
        </div>

        <div id="alertBox"></div>

        <form class="auth-form" onsubmit="handleRegisterSubmit(event)">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    class="auth-input"
                    placeholder="e.g. John Doe"
                    required
                />
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    class="auth-input"
                    placeholder="name@example.com"
                    required
                />
            </div>

            <div class="form-group">
                <label for="phone">Phone Number (Optional)</label>
                <input
                    type="tel"
                    id="phone"
                    class="auth-input"
                    placeholder="e.g. +252..."
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        class="auth-input"
                        placeholder="Create strong password"
                        required
                    />
                    <span class="password-toggle" onclick="toggleFieldVisibility('password', this)">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="confirmPassword"
                        class="auth-input"
                        placeholder="Repeat your password"
                        required
                    />
                    <span class="password-toggle" onclick="toggleFieldVisibility('confirmPassword', this)">👁️</span>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required />
                <label for="terms" style="cursor: pointer; font-size: 0.95rem;">
                    I agree to the terms and conditions
                </label>
            </div>

            <button
                type="submit"
                class="auth-btn"
            >
                Create Account
            </button>

        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <div class="social-login">
            <button class="social-btn" type="button">
                Sign up with Google
            </button>
            <button class="social-btn" type="button">
                Sign up with Facebook
            </button>
        </div>

        <div class="auth-footer">
            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>
            <p style="margin-top: 10px; font-size: 0.9rem;">
                <a href="index.html" style="color: var(--text-light); font-weight: normal;">← Back to Home</a>
            </p>
        </div>

    </div>

</section>

<script src="main.js"></script>
<script src="auth.js"></script>

<script>
/* ========================================
   LOCAL REGISTER FORM BRIDGE HANDLER
======================================== */
function handleRegisterSubmit(event) {
    event.preventDefault();
    
    // Safety verification check: execute registerUser from auth.js
    if (typeof registerUser === "function") {
        registerUser();
    } else {
        console.error("registerUser function not found in auth.js");
    }
}

/* ========================================
   REUSABLE PASSWORD FIELD TOGGLER
======================================== */
function toggleFieldVisibility(fieldId, element) {
    const inputField = document.getElementById(fieldId);
    if (!inputField) return;

    if (inputField.type === "password") {
        inputField.type = "text";
        element.textContent = "🙈";
    } else {
        inputField.type = "password";
        element.textContent = "👁️";
    }
}
</script>

</body>
</html>
